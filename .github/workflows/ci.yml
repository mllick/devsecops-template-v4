name: CI
on: [push]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install httpx pytest  # Assurez-vous qu'ils sont bien installés

      - name: Run tests
        # C'est ici qu'on injecte les variables pour Pydantic
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/testdb
          SECRET_KEY: temporary_secret_key_for_ci_testing
        run: pytest backend/tests

      - name: Run security scan (Bandit)
        run: bandit -r backend/app

  # Nouvelle étape : Construction de l'image Docker
  build-docker:
    needs: test # On ne build que si les tests passent !
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker Image
        run: |
          docker build -t mllick/devsecops-template:latest .
          echo "Image construite avec succès !"
